<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Hairolozy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #D4AF37; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Service Cards Grid */
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .service-card { background: #1e1e1e; border: 2px solid #333; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .service-card:hover { border-color: #D4AF37; background: #252525; }
        .service-card.selected { border-color: #D4AF37; background: #2d2610; }
        .service-card p { margin: 5px 0 0; font-size: 13px; font-weight: bold; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #D4AF37; font-size: 13px; font-weight: bold; }
        input, textarea { width: 100%; background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 14px; border-radius: 8px; box-sizing: border-box; }
        
        .book-btn { background: #D4AF37; color: #121212; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #successMsg { display: none; text-align: center; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #D4AF37; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Hairolozy</h1><p>Select Your Premium Service</p></div>

    <div id="bookingForm">
        <!-- Visual Service Cards -->
        <div class="service-grid" id="serviceGrid">
            <div class="service-card" onclick="selectService('Haircut', this)"><p>✂️ Haircut</p></div>
            <div class="service-card" onclick="selectService('Hair Color', this)"><p>🎨 Hair Color</p></div>
            <div class="service-card" onclick="selectService('Balayage', this)"><p>✨ Balayage</p></div>
            <div class="service-card" onclick="selectService('Keratin', this)"><p>💆‍♀️ Keratin</p></div>
        </div>
        <input type="hidden" id="selected-service">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="client-name" placeholder="Your Name">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="client-phone" placeholder="Your Number">
        </div>

        <!-- Hair History Box -->
        <div class="form-group">
            <label>Hair History (Box Dye/Henna/Smoothening?)</label>
            <textarea id="hair-history" rows="3" placeholder="Tell me about your previous chemical treatments..."></textarea>
        </div>

        <div class="form-group">
            <label>Preferred Date</label>
            <input type="date" id="client-date" onchange="checkThursday()">
        </div>

        <div class="form-group">
            <label>Preferred Time</label>
            <input type="time" id="client-time">
        </div>

        <button class="book-btn" onclick="submitBooking()">CONFIRM APPOINTMENT</button>
    </div>

    <div id="successMsg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A", authDomain: "hairolozy-12bec.firebaseapp.com", projectId: "hairolozy-12bec", storageBucket: "hairolozy-12bec.appspot.com", messagingSenderId: "386170490787", appId: "1:386170490787:web:58b592d8a44d0e3de65416" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function selectService(service, el) {
        document.getElementById('selected-service').value = service;
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function checkThursday() {
        let d = new Date(document.getElementById("client-date").value);
        if(d.getDay() === 4) { alert("Thursday is Weekly Off!"); document.getElementById("client-date").value = ""; }
    }

    function submitBooking() {
        const name = document.getElementById('client-name').value;
        const phone = document.getElementById('client-phone').value;
        const service = document.getElementById('selected-service').value;
        const history = document.getElementById('hair-history').value;
        const date = document.getElementById('client-date').value;
        const time = document.getElementById('client-time').value;

        if(!name || !service || !date) return alert("Please fill details!");

        const bookingID = "HLZ-" + Math.floor(1000 + Math.random() * 9000);
        db.collection("clients").add({
            bookingID, clientName: name, clientPhone: phone, serviceName: service, 
            history: "History: " + history, bookingDate: date, bookingTime: time, status: 'pending'
        }).then(() => {
            document.getElementById('bookingForm').innerHTML = `<h3>Booking Success!</h3><p>Your ID: ${bookingID}</p>
            <a href="https://wa.me/91XXXXXXXXXX?text=New Booking: ${name}, ${service}, ID: ${bookingID}" style="color:#25d366; font-weight:bold;">📲 WhatsApp Arman</a>`;
        });
    }
</script>
</body>
</html>
