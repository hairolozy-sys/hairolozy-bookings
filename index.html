<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hairolozy — by Arman | Luxury Hair Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --cream: #faf6f0;
    --dark: #1a1410;
    --brown: #3d2b1f;
    --accent: #8b5e3c;
    --text-muted: #8a7968;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Josefin Sans', sans-serif; background: var(--dark); color: var(--cream); overflow-x: hidden; cursor: none; }
  @media (pointer: coarse) { .cursor, .cursor-ring { display: none !important; } body { cursor: auto; } }
  .cursor { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
  .cursor-ring { width: 36px; height: 36px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; opacity: 0.6; }
  
  /* Styling remains same as before for consistency */
  .hero { min-height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: var(--dark); }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,169,110,0.12) 0%, transparent 60%); }
  .noise { position: fixed; inset: 0; z-index: 1000; pointer-events: none; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
  .hero-content { position: relative; z-index: 2; text-align: center; padding: 2rem; animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both; }
  .hero-tag { font-family: 'Josefin Sans', sans-serif; font-size: 0.7rem; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 2rem; animation: fadeUp 1s 0.3s both; }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 10vw, 9rem); font-weight: 300; line-height: 0.9; letter-spacing: -0.02em; background: linear-gradient(135deg, #e8d5a3 0%, #c9a96e 40%, #faf6f0 70%, #c9a96e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: fadeUp 1s 0.5s both; }
  .hero-sub { font-family: 'Cormorant Garamond', serif; font-size: clamp(1rem, 3vw, 1.5rem); font-weight: 300; font-style: italic; color: var(--gold-light); margin-top: 1rem; animation: fadeUp 1s 0.7s both; }
  .hero-cta { animation: fadeUp 1s 1.1s both; }
  .btn-gold { display: inline-block; padding: 1rem 3rem; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; background: transparent; }
  
  .booking-section { background: linear-gradient(135deg, #1f170f 0%, var(--dark) 50%, #150f0a 100%); padding: 6rem 5%; }
  .booking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
  @media (max-width: 768px) { .booking-grid { grid-template-columns: 1fr; } }
  .form-frame { border: 1px solid rgba(201,169,110,0.2); padding: 2.5rem; background: rgba(255,255,255,0.02); }
  .form-group { margin-bottom: 1.2rem; }
  .form-label { display: block; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
  .form-input, .form-select, .form-textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(201,169,110,0.25); padding: 0.6rem 0; color: var(--cream); font-family: 'Josefin Sans', sans-serif; font-size: 0.85rem; outline: none; }
  .btn-confirm { width: 100%; padding: 1.2rem; background: var(--gold); border: none; color: var(--dark); font-size: 0.95rem; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; margin-top: 1.5rem; }
  
  .success-overlay { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(26,20,16,0.95); align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; text-align: center; }
  .success-overlay.show { display: flex; }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes rotateBadge { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="noise"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<section class="hero" id="home">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <p class="hero-tag">✦ Luxury Hair Studio ✦ by Arman</p>
    <h1 class="hero-title">Hair<em>olo</em>zy</h1>
    <p class="hero-sub">Where artistry meets advanced hair chemistry</p>
    <div class="hero-divider"></div>
    <div class="hero-cta"><a href="#booking" class="btn-gold"><span>Book Your Appointment</span></a></div>
  </div>
</section>

<section class="booking-section" id="booking">
  <div class="booking-grid">
    <div class="booking-info">
      <p class="section-label">Reservations</p>
      <h2>Book Your<br><em>Experience</em></h2>
    </div>
    <div class="form-frame">
      <form id="bookingForm">
        <input type="hidden" name="access_key" value="35460aac-0267-4045-b24f-0bed6ab32101">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="client_name" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" name="client_phone" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Service</label>
          <select name="service_required" class="form-select" required>
            <option value="" disabled selected>Select a Service</option>
            <option value="Hair Cut">Hair Cut</option>
            <option value="Hair Color">Hair Color</option>
            <option value="Balayage">Balayage</option>
            <option value="Keratin Treatment">Keratin Treatment</option>
          </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" name="booking_date" class="form-input" id="bookingDate" required>
            </div>
            <div class="form-group">
                <label class="form-label">Time</label>
                <select name="booking_time" class="form-select" id="bookingTime" required></select>
            </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea name="client_notes" class="form-textarea"></textarea>
        </div>
        <button type="submit" class="btn-confirm" id="submitBtn">CONFIRM BOOKING</button>
      </form>
    </div>
  </div>
</section>

<div class="success-overlay" id="successOverlay">
  <h2 class="success-title">Confirmed</h2>
  <button class="btn-gold" onclick="location.reload()">Close</button>
</div>

<script>
  const allSlots = ["10:00 am", "10:30 am", "11:00 am", "11:30 am", "12:00 pm", "12:30 pm", "01:00 pm", "01:30 pm", "02:00 pm", "02:30 pm", "03:00 pm", "03:30 pm", "04:00 pm", "04:30 pm", "05:00 pm", "05:30 pm", "06:00 pm", "06:30 pm", "07:00 pm", "07:30 pm", "08:00 pm"];
  const timeSelect = document.getElementById('bookingTime');
  const bookingForm = document.getElementById('bookingForm');
  const submitBtn = document.getElementById('submitBtn');
  
  // Google Sheet Script URL
  const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1cf4ZtyQkc4_fiHUxfluMIiSABE0J5wyXiE8lYy93-nDJcSQQRW53hDG8xuUYUiY9/exec';

  function rebuildTimeDropdown() {
    timeSelect.innerHTML = '<option value="" disabled selected>Select a Time Slot</option>';
    allSlots.forEach(slot => {
      const opt = document.createElement('option');
      opt.value = slot; opt.textContent = slot;
      timeSelect.appendChild(opt);
    });
  }
  rebuildTimeDropdown();

  bookingForm.addEventListener('submit', function(e) {
    e.preventDefault();
    submitBtn.innerHTML = "SENDING...";
    const data = Object.fromEntries(new FormData(bookingForm));
    
    // Send to Email
    fetch('https://api.web3forms.com/submit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    
    // Send to Google Sheet
    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
    .then(() => {
        document.getElementById('successOverlay').classList.add('show');
    });
  });
</script>
</body>
</html>
