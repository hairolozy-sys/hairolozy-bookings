<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hairolozy — Luxury Hair Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
  :root { --gold: #c9a96e; --cream: #faf6f0; --dark: #1a1410; --text-muted: #8a7968; }
  body { font-family: 'Josefin Sans', sans-serif; background: var(--dark); color: var(--cream); margin: 0; }
  
  /* --- UI LAYOUT STYLES --- */
  .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .booking-section { padding: 8rem 5%; background: #150f0a; }
  .booking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
  .form-group { margin-bottom: 1.5rem; }
  .form-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gold); color: white; padding: 10px 0; }
  .btn-submit { width: 100%; padding: 1.5rem; background: var(--gold); border: none; cursor: pointer; color: var(--dark); font-weight: bold; }
  
  #successOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
  #successOverlay.show { display: flex; }
</style>
</head>
<body>

<section class="hero">
  <h1>Hairolozy</h1>
  <p>Luxury Hair Studio by Arman</p>
</section>

<section class="booking-section" id="booking">
  <div class="booking-grid">
    <div class="booking-info">
      <h2>Book <em>Your</em> Appointment</h2>
    </div>
    
    <form id="bookingForm">
      <div class="form-group">
        <input type="text" name="name" placeholder="Name" class="form-input" required>
      </div>
      <div class="form-group">
        <input type="email" name="email" placeholder="Email" class="form-input" required>
      </div>
      <button type="submit" class="btn-submit">CONFIRM BOOKING (DUAL ENGINE)</button>
    </form>
  </div>
</section>

<div id="successOverlay">
  <h2>Request Received</h2>
  <p>Dono engines active hain. Aapka data process ho gaya hai.</p>
</div>

<script>
  const FORM_ENDPOINT_1 = "https://formspree.io/f/YOUR_FORM_ID"; 
  const FORM_ENDPOINT_2 = "https://your-custom-backend.com/api/track"; 

  const bookingForm = document.getElementById('bookingForm');
  const successOverlay = document.getElementById('successOverlay');

  bookingForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(bookingForm);
    const data = Object.fromEntries(formData.entries());

    // DUAL ENGINE TRIGGER
    try {
      // Engine 1
      const engine1 = fetch(FORM_ENDPOINT_1, {
        method: "POST",
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'application/json' }
      });

      // Engine 2
      const engine2 = fetch(FORM_ENDPOINT_2, {
        method: "POST",
        body: JSON.stringify({ ...data, status: 'initiated' }),
        headers: { 'Content-Type': 'application/json' }
      });

      await Promise.allSettled([engine1, engine2]);
      
      successOverlay.classList.add('show');
      setTimeout(() => successOverlay.classList.remove('show'), 3000);
      bookingForm.reset();
      
    } catch (error) {
      alert("Engine connection failed. Check your network.");
    }
  });
</script>

</body>
</html>
