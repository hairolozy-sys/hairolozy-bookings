<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Hairolozy Luxury Salon</title>
    <style>
        /* LUXURY DARK THEME */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .booking-container { background: #1e1e1e; width: 100%; max-width: 450px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; border-top: 3px solid #D4AF37; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #D4AF37; margin: 0; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }
        .header p { color: #aaa; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #D4AF37; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        
        input, select { width: 100%; background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 14px; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #D4AF37; box-shadow: 0 0 8px rgba(212, 175, 55, 0.3); }
        
        /* Date & Time Icon Colors */
        ::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(5) hue-rotate(10deg); cursor: pointer; }

        .book-btn { background: linear-gradient(135deg, #D4AF37, #b5952f); color: #121212; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .book-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5); }

        .success-msg { display: none; text-align: center; color: #2ecc71; font-size: 18px; font-weight: bold; margin-top: 20px; padding: 15px; border: 1px solid #2ecc71; border-radius: 8px; background: rgba(46, 204, 113, 0.1); }
    </style>
</head>
<body>

    <div class="booking-container">
        <div class="header">
            <h1>Hairolozy</h1>
            <p>Luxury Salon Experience</p>
        </div>

        <div id="bookingForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="client-name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="client-phone" placeholder="Enter your mobile number" required>
            </div>

            <div class="form-group">
                <label>Select Service</label>
                <select id="client-service" required>
                    <option value="" disabled selected>Choose a service</option>
                    <option value="Haircut">Haircut</option>
                    <option value="Hair Color">Hair Color</option>
                    <option value="Balayage">Balayage</option>
                    <option value="Keratin Treatment">Keratin Treatment</option>
                    <option value="Smoothening">Smoothening</option>
                    <option value="Color Correction">Color Correction</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Date</label>
                <!-- THURSDAY BLOCKING LOGIC IS CONNECTED TO THIS INPUT -->
                <input type="date" id="client-date" onchange="checkThursday()" required>
            </div>

            <div class="form-group">
                <label>Select Time</label>
                <input type="time" id="client-time" required>
            </div>

            <button class="book-btn" onclick="submitBooking()">Confirm Appointment</button>
        </div>

        <!-- Success Message after booking -->
        <div id="successMsg" class="success-msg">
            🎉 Booking Confirmed!<br><span style="font-size:14px; color:#aaa; font-weight:normal; display:block; margin-top:5px;">We will see you at the salon.</span>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Set Minimum Date to Today (So they can't book past dates)
        let today = new Date().toISOString().split('T')[0];
        document.getElementById("client-date").setAttribute('min', today);

        // 3. 🚨 THURSDAY (WEEKLY OFF) BLOCKING LOGIC 🚨
        function checkThursday() {
            let dateInput = document.getElementById("client-date");
            let selectedDate = new Date(dateInput.value);
            
            // getDay() returns 4 for Thursday
            if(selectedDate.getDay() === 4) {
                alert("❌ Sorry! Every Thursday our salon is closed (Weekly Off). Please select another date.");
                dateInput.value = ""; // Clear the selected date
            }
        }

        // 4. Save Booking to Firebase
        function submitBooking() {
            const name = document.getElementById('client-name').value;
            const phone = document.getElementById('client-phone').value;
            const service = document.getElementById('client-service').value;
            const date = document.getElementById('client-date').value; // Format is YYYY-MM-DD
            let time = document.getElementById('client-time').value;

            if(!name || !phone || !service || !date || !time) {
                return alert("Please fill all the details to book your appointment.");
            }

            // Convert 24hr time to 12hr AM/PM format for better look on Admin Dashboard
            let timeParts = time.split(':');
            let hours = parseInt(timeParts[0]);
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            let formattedTime = hours + ':' + timeParts[1] + ' ' + ampm;

            // Save to Firebase (Same 'clients' collection as Admin)
            db.collection("clients").add({
                clientName: name,
                clientPhone: phone,
                serviceName: service,
                bookingDate: date,
                bookingTime: formattedTime,
                status: 'pending',
                history: '',
                billAmount: ''
            }).then(() => {
                // Hide Form and Show Success Message
                document.getElementById('bookingForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }).catch((error) => {
                alert("Error: " + error.message);
            });
        }
    </script>
</body>
</html>
