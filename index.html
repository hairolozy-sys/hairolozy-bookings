<!-- Yahan par aapka form hai (already existing), bas <script> tag ko update kar dijiye -->

<script>
  // DUAL ENGINE INITIALIZATION
  const FORM_ENDPOINT_1 = "https://formspree.io/f/YOUR_FORM_ID"; // Primary: Email/Dashboard
  const FORM_ENDPOINT_2 = "https://your-custom-backend.com/api/track"; // Secondary: Custom/Analytics

  const bookingForm = document.getElementById('bookingForm');
  const successOverlay = document.getElementById('successOverlay');

  bookingForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData(bookingForm);
    const data = Object.fromEntries(formData.entries());

    // START DUAL ENGINE
    try {
      // Engine 1: Primary Delivery
      const engine1 = fetch(FORM_ENDPOINT_1, {
        method: "POST",
        body: JSON.stringify(data),
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
      });

      // Engine 2: Data Logging / CRM Sync
      const engine2 = fetch(FORM_ENDPOINT_2, {
        method: "POST",
        body: JSON.stringify({ ...data, timestamp: new Date().toISOString() }),
        headers: { 'Content-Type': 'application/json' }
      });

      // Dono engines ka wait karenge
      await Promise.allSettled([engine1, engine2]);
      
      // Success State
      successOverlay.classList.add('show');
      bookingForm.reset();
      
    } catch (error) {
      console.error("Engine Sync Error:", error);
      alert("Something went wrong with the engines. Please try again.");
    }
  });

  // Cursor and Scroll interactions remain same...
</script>
