<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hairolozy — by Arman | Luxury Hair Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
  :root { --gold: #c9a96e; --gold-light: #e8d5a3; --cream: #faf6f0; --dark: #1a1410; --text-muted: #8a7968; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Josefin Sans', sans-serif; background: var(--dark); color: var(--cream); overflow-x: hidden; }
  /* (Baaki ki CSS aapke original code wali hi hai - yahan wahi use karna) */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: rgba(201,169,110,0.15); }
  .service-card { background: var(--dark); padding: 3rem 2.5rem; position: relative; }
</style>
</head>
<body>

<section class="section" id="services">
  <p class="section-label">Our Signature Services</p>
  <h2 class="section-heading">Crafted for <em>You</em></h2>
  <div class="services-grid">
    <div class="service-card"><div class="service-num">01</div><h3 class="service-name">Hair Cut</h3><p class="service-desc">Precision cutting.</p></div>
    <div class="service-card"><div class="service-num">02</div><h3 class="service-name">Coloring</h3><p class="service-desc">Professional color.</p></div>
  </div>
</section>

<section class="booking-section" id="booking">
  <form id="bookingForm" class="booking-grid">
    <div class="booking-info">
      <h2>Book <em>Your</em> Appointment</h2>
    </div>
    <div class="form-frame">
      <input type="text" name="name" placeholder="Full Name" class="form-input" required>
      <input type="email" name="email" placeholder="Email" class="form-input" required>
      <button type="submit" class="btn-submit">Confirm Request</button>
    </div>
  </form>
</section>

<div class="success-overlay" id="successOverlay">
  <h2 class="success-title">Request Sent</h2>
  <button class="btn-gold" onclick="document.getElementById('successOverlay').classList.remove('show')">Close</button>
</div>

<script>
  const FORM_ENDPOINT_1 = "https://formspree.io/f/YOUR_FORM_ID"; 
  const FORM_ENDPOINT_2 = "https://your-custom-webhook.com/data"; 

  const bookingForm = document.getElementById('bookingForm');
  const successOverlay = document.getElementById('successOverlay');

  bookingForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(bookingForm).entries());

    // DUAL ENGINE START
    await Promise.allSettled([
      fetch(FORM_ENDPOINT_1, { method: "POST", body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} }),
      fetch(FORM_ENDPOINT_2, { method: "POST", body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} })
    ]);
    
    successOverlay.classList.add('show');
    bookingForm.reset();
  });
</script>

</body>
</html>
