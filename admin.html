<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Premium Admin</title>
    <style>
        /* LUXURY DARK THEME */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 15px; margin: 0; }
        .header { background: #1a1a1a; color: #D4AF37; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-bottom: 2px solid #D4AF37; }
        h2 { margin: 0; font-size: 24px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }

        /* Dashboard Overview */
        .dashboard { display: flex; gap: 15px; margin-top: 15px; }
        .dash-box { background: #1e1e1e; color: #fff; flex: 1; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dash-box h3 { margin: 0; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .dash-box p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #D4AF37; }
        .dash-box.green p { color: #2ecc71; }

        /* Search Bar */
        .search-container { margin: 20px 0; position: sticky; top: 75px; z-index: 99; }
        .search-bar { width: 100%; padding: 15px 20px; border-radius: 30px; background: #1e1e1e; border: 1px solid #444; color: #fff; font-size: 15px; outline: none; box-sizing: border-box; }
        .search-bar:focus { border-color: #D4AF37; }

        /* Client Cards */
        .card { background: #1e1e1e; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid #D4AF37; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; border-right: 1px solid #333; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .card.done { border-left: 5px solid #27ae60; opacity: 0.8; }
        .card.vip { border-left: 5px solid #D4AF37 !important; box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }

        .card-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .client-info { display: flex; flex-direction: column; gap: 5px; }
        .client-name { font-size: 18px; font-weight: bold; color: #fff; }
        .client-details { font-size: 13px; color: #aaa; }
        .time-badge { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid #D4AF37; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .done .time-badge { background: rgba(39, 174, 96, 0.1); color: #2ecc71; border-color: #2ecc71; text-decoration: line-through; }
        .bill-badge { font-size: 14px; color: #2ecc71; font-weight: bold; margin-top: 5px; }

        /* Card Body & Inputs */
        .card-body { padding: 0 15px 15px 15px; display: none; border-top: 1px solid #333; margin-top: 5px; padding-top: 15px; }
        .formula-box { background: #252525; padding: 15px; border-radius: 8px; border: 1px dashed #555; margin-bottom: 15px; font-size: 14px; color: #ddd; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .matrix-grid input, .matrix-grid select { background: #2a2a2a; color: #fff; width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; font-size: 13px; box-sizing: border-box; outline: none; }
        .full-width { grid-column: span 2; }
        .bill-input { grid-column: span 2; border: 1px solid #2ecc71 !important; color: #2ecc71 !important; font-weight: bold; font-size: 16px !important; }
        .brand-select { border: 1px solid #D4AF37 !important; color: #D4AF37 !important; font-weight: bold; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .save-btn { background: #d35400; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .done-btn { background: #27ae60; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .del-btn { background: transparent; color: #e74c3c; width: 100%; padding: 10px; border: 1px solid #e74c3c; border-radius: 8px; margin-top: 12px; cursor: pointer; }
        .upload-btn { background: #2980b9; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }

        /* Floating Buttons */
        .fab { position: fixed; bottom: 30px; right: 30px; background: #D4AF37; color: #121212; width: 65px; height: 65px; border-radius: 50%; font-size: 35px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); border: none; font-weight: bold; z-index: 101; cursor: pointer;}
        .ai-fab { position: fixed; bottom: 30px; right: 110px; background: #2c3e50; color: #D4AF37; width: 65px; height: 65px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0, 0.5); border: 2px solid #D4AF37; font-weight: bold; z-index: 101; cursor: pointer;}

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 102; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; animation: slideUp 0.3s ease; border: 1px solid #333; max-height: 90vh; overflow-y: auto;}
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { float: right; cursor: pointer; font-size: 26px; font-weight: bold; color: #888; margin-top: -15px; }
        .modal-content input, .modal-content select, .modal-content textarea { background: #2a2a2a; color: #fff; width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; font-size: 14px; outline: none; }
        .add-btn { background: #D4AF37; color: #121212; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 15px; }
        
        /* AI Result Box */
        #aiResultBox { display: none; background: #252525; padding: 15px; border-radius: 8px; border: 1px dashed #D4AF37; margin-top: 15px; font-size: 14px; color: #ddd; line-height: 1.6; }
        .pdf-btn { background: #c0392b; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header"><h2>Hairolozy</h2></div>
    
    <div style="padding: 15px;">
        <div class="dashboard">
            <div class="dash-box">
                <h3>Today's Clients</h3>
                <p id="dash-clients">0</p>
            </div>
            <div class="dash-box green">
                <h3>Today's Revenue</h3>
                <p id="dash-revenue">₹0</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search Client or Phone..." onkeyup="filterList()">
        </div>
        <div id="list">Loading Luxury Experience...</div>
    </div>

    <button class="fab" onclick="openModal()">+</button>
    <button class="ai-fab" onclick="openAIModal()">AI</button>

    <div id="walkinModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 style="margin-top:0; color:#D4AF37; text-align:center;">New Walk-in</h3>
            <input type="text" id="new-name" placeholder="Client Name">
            <input type="tel" id="new-phone" placeholder="Phone Number">
            <input type="text" id="new-service" placeholder="Service (e.g. Color Correction)">
            <input type="text" id="new-formula" placeholder="Quick Notes...">
            <button class="add-btn" onclick="addDirectClient()">Save Client</button>
        </div>
    </div>

    <div id="aiModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-btn" onclick="closeAIModal()">&times;</span>
            <h3 style="margin-top:0; color:#D4AF37; text-align:center;">🤖 AI Expert Formulator</h3>
            
            <input type="text" id="aiClientName" placeholder="Client Name (for PDF)">
            <input type="tel" id="aiClientPhone" placeholder="Phone Number"> <div class="matrix-grid">
                <input type="number" id="aiCurrentLevel" placeholder="Current Level (1-10)">
                <input type="number" id="aiTargetShade" placeholder="Target Level (1-10)">
            </div>
            
            <select id="aiBrandSelect" class="brand-select" style="margin-bottom: 8px;">
                <option value="" style="color:#aaa;">🎨 Choose Preferred Brand</option>
                <option value="L'Oréal">L'Oréal (Majirel / INOA)</option>
                <option value="Redken">Redken (Shades EQ / Color Gels)</option>
                <option value="Schwarzkopf">Schwarzkopf (Igora Royal)</option>
                <option value="Wella">Wella (Koleston Perfect)</option>
                <option value="Matrix">Matrix (SoColor)</option>
                <option value="Keune">Keune (Tinta Color)</option>
                <option value="Alfaparf">Alfaparf (Evolution)</option>
                <option value="Joico">Joico (LumiShine)</option>
                <option value="Pravana">Pravana (ChromaSilk)</option>
                <option value="Other">Other (None/General)</option>
            </select>
            
            <textarea id="aiSpecialNotes" rows="2" placeholder="Special Condition? (e.g. Stubborn grey, Box dye)"></textarea>
            
            <button class="add-btn" onclick="generateAIFormula()">✨ Calculate Formulation</button>
            
            <div id="aiResultBox"></div>
            <button id="aiPdfBtn" class="pdf-btn" onclick="downloadAIPdf()">📄 Download PDF Report</button>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('walkinModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('walkinModal').style.display = 'none'; }
        function openAIModal() { document.getElementById('aiModal').style.display = 'flex'; }
        function closeAIModal() { 
            document.getElementById('aiModal').style.display = 'none'; 
            document.getElementById('aiResultBox').style.display = 'none';
            document.getElementById('aiPdfBtn').style.display = 'none';
        }

        window.onclick = function(event) { 
            if (event.target == document.getElementById('walkinModal')) closeModal(); 
            if (event.target == document.getElementById('aiModal')) closeAIModal(); 
        }

        function toggleCard(id) {
            let body = document.getElementById('body-' + id);
            body.style.display = (body.style.display === 'block') ? 'none' : 'block';
        }

        function filterList() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                cards[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        // --- UPGRADED AI SCIENCE LOGIC ---
        let currentAIFormula = {};
        function generateAIFormula() {
            const clientName = document.getElementById('aiClientName').value || "Client";
            const clientPhone = document.getElementById('aiClientPhone').value || "N/A";
            const currentLvl = parseInt(document.getElementById('aiCurrentLevel').value);
            const targetLvl = parseInt(document.getElementById('aiTargetShade').value);
            const brand = document.getElementById('aiBrandSelect').value;
            const notes = document.getElementById('aiSpecialNotes').value;

            if (!currentLvl || !targetLvl || !brand) {
                alert("Please fill Current Level, Target Level, and Brand.");
                return;
            }

            const resultBox = document.getElementById('aiResultBox');
            
            // Advance Hair Science Calculation
            let devVol = "20 Vol (6%)";
            let strategy = "Standard Processing / Deposit";
            let pigmentExposed = "None (No Lift)";
            let neutralization = "Target shade directly applied";
            
            if (targetLvl > currentLvl) {
                let liftLevels = targetLvl - currentLvl;
                
                // Developer Logic based on lift
                if (liftLevels == 1) devVol = "20 Vol (6%)";
                else if (liftLevels == 2) devVol = "30 Vol (9%)";
                else if (liftLevels >= 3) { devVol = "40 Vol / Pre-lightener Needed"; strategy = "High Lift / Bleach Wash required before deposit."; }
                
                // Underlying Pigment & Neutralization Logic
                if (targetLvl <= 4) { pigmentExposed = "Red"; neutralization = "Add Green/Matte (Ash) tone to neutralize."; }
                else if (targetLvl == 5 || targetLvl == 6) { pigmentExposed = "Orange / Red-Orange"; neutralization = "Add Blue/Ash tone to neutralize warmth."; }
                else if (targetLvl == 7) { pigmentExposed = "Yellow-Orange"; neutralization = "Add Blue-Violet tone."; }
                else if (targetLvl >= 8) { pigmentExposed = "Pale Yellow"; neutralization = "Add Violet tone (Toner) to achieve clean blonde."; }
            } else if (targetLvl < currentLvl) {
                devVol = "10 Vol (3%)";
                strategy = "Color Deposition (Going Darker). Consider filling missing pigments if dropping 2+ levels.";
            }

            // Grams Calculation (Standard 1:1.5 Mix)
            let colorGrams = 40;
            let devGrams = 60; // 40 * 1.5

            currentAIFormula = {
                client: clientName, phone: clientPhone, date: new Date().toLocaleDateString(), brand: brand,
                current: currentLvl, target: targetLvl, notes: notes,
                formula: `${colorGrams}g of Level ${targetLvl}`, developer: `${devGrams}g of ${devVol}`,
                pigment: pigmentExposed, neutralize: neutralization, strategy: strategy
            };

            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <h4 style="color:#D4AF37; margin-top:0;">Hybrid Science Analysis</h4>
                <strong>Underlying Pigment:</strong> <span style="color:#e74c3c;">${pigmentExposed}</span><br>
                <strong>Neutralization Required:</strong> <span style="color:#3498db;">${neutralization}</span><br>
                <hr style="border: 0.5px solid #444;">
                <strong>Brand:</strong> ${brand}<br>
                <strong>Exact Mix:</strong> ${currentAIFormula.formula} + ${currentAIFormula.developer} <span style="color:#aaa;">(Ratio 1:1.5)</span><br>
                <strong>Action:</strong> ${strategy}<br>
            `;
            document.getElementById('aiPdfBtn').style.display = 'block';
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allBookings = {};

        function updateDashboard() {
            let rev = 0; let clientsCount = 0;
            const now = new Date();
            const format1 = now.toLocaleDateString(); 
            const format2 = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; 

            for (let id in allBookings) {
                let b = allBookings[id];
                if (b.date === format1 || b.date === format2) {
                    clientsCount++;
                    if (b.status === 'done' && b.bill) rev += parseFloat(b.bill);
                }
            }
            document.getElementById('dash-clients').innerText = clientsCount;
            document.getElementById('dash-revenue').innerText = "₹" + rev;
        }

        // EXACT ORIGINAL SYNC LOGIC RESTORED
        function startSync() {
            const folders = ["Bookings", "bookings", "clientname", "clients"];
            folders.forEach(folder => {
                const ref = (folder === "clients") ? db.collection(folder) : db.collectionGroup(folder);
                ref.onSnapshot((snap) => {
                    snap.forEach(doc => {
                        const data = doc.data();
                        if (!data.clientName && !data.name) return;
                        allBookings[doc.id] = { date: data.bookingDate || data.date || '', status: data.status || 'pending', bill: data.billAmount || 0 };
                        renderCard(doc);
                    });
                    updateDashboard();
                });
            });
        }

        function renderCard(doc) {
            const data = doc.data();
            if (!data.clientName && !data.name) return;
            const id = doc.id;
            const path = doc.ref.path;
            
            let existingCard = document.getElementById('card-' + id);
            if (existingCard) { existingCard.remove(); }

            const listDiv = document.getElementById("list");
            if (listDiv.innerHTML.includes("Loading")) listDiv.innerHTML = "";

            let statusClass = data.status === 'done' ? 'done' : '';
            if (data.isVIP) statusClass += ' vip';

            const statusText = data.status === 'done' ? 'Completed' : (data.bookingTime || data.time || 'Walk-in');
            const billDisplay = data.billAmount ? `<div class="bill-badge">💰 Bill: ₹${data.billAmount}</div>` : '';
            const photoDisplay = data.photoUrl ? `<img src="${data.photoUrl}" style="max-width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444;">` : '';
            const vipBadge = data.isVIP ? ` <span style="color:#D4AF37; font-size:12px;">[VIP]</span>` : '';

            const card = document.createElement('div');
            card.className = `card ${statusClass}`;
            card.id = 'card-' + id;
            
            card.innerHTML = `
                <div class="card-header" onclick="toggleCard('${id}')">
                    <div class="client-info">
                        <span class="client-name">👤 ${data.clientName || data.name}${vipBadge}</span>
                        <span class="client-details">✂️ ${data.serviceName || 'N/A'} | 📞 ${data.clientPhone || 'N/A'}</span>
                        ${billDisplay}
                    </div>
                    <div class="time-badge">🕒 ${statusText}</div>
                </div>
                
                <div class="card-body" id="body-${id}">
                    ${photoDisplay}
                    <div class="formula-box"><strong>Last Formulation:</strong><br> ${data.history || "No record."}</div>
                    
                    <div class="matrix-grid">
                        <select id="brand-${id}" class="full-width brand-select">
                            <option value="" style="color:#aaa;">🎨 Select Colo
