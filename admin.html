<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hairolozy Admin</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 10px; }
        .panel { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; margin-bottom: 10px; border-radius: 5px; }
        .pill { display: inline-block; padding: 5px 10px; border: 1px solid #555; border-radius: 15px; font-size: 12px; margin: 3px; cursor: pointer; }
        .pill.active { background: #D4AF37; color: #000; border-color: #D4AF37; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #D4AF37; font-size: 10px; text-transform: uppercase; text-align: left; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #333; font-size: 13px; }
        .btn-save { background: #D4AF37; width: 100%; padding: 12px; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <input type="text" id="c-name" placeholder="Client Name">
        <input type="tel" id="c-phone" placeholder="Phone">
        
        <label style="font-size:10px; color:#D4AF37;">BRANDS</label>
        <div id="brand-pills">
            <span class="pill" onclick="toggle(this, 'brands')">L'Oréal</span>
            <span class="pill" onclick="toggle(this, 'brands')">Redken</span>
            <span class="pill" onclick="toggle(this, 'brands')">Wella</span>
        </div>
        
        <label style="font-size:10px; color:#D4AF37; display:block; margin-top:10px;">SERVICES</label>
        <div id="service-pills">
            <span class="pill" onclick="toggle(this, 'services')">Haircut</span>
            <span class="pill" onclick="toggle(this, 'services')">Color</span>
            <span class="pill" onclick="toggle(this, 'services')">Nanoplastia</span>
            <span class="pill" onclick="toggle(this, 'services')">Keratin</span>
        </div>

        <input type="text" id="m-base" placeholder="Base/Target/Dev/Time">
        <input type="number" id="c-bill" placeholder="Bill Amount">
        <button class="btn-save" onclick="saveRecord()">SAVE RECORD</button>
    </div>

    <table>
        <thead><tr><th>DATE</th><th>CLIENT</th><th>SERVICES</th><th>BILL</th><th>STATUS</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const db = firebase.firestore();
        firebase.initializeApp({ /* Wahi configs */ });
        
        let sB = [], sS = [];
        function toggle(el, type) {
            el.classList.toggle('active');
            let val = el.innerText;
            if(type=='brands') sB.includes(val) ? sB.splice(sB.indexOf(val), 1) : sB.push(val);
            else sS.includes(val) ? sS.splice(sS.indexOf(val), 1) : sS.push(val);
        }

        function saveRecord() {
            db.collection("clients").add({
                clientName: document.getElementById('c-name').value,
                serviceName: sS.join(', '),
                history: `Brands: ${sB.join(', ')} | Matrix: ${document.getElementById('m-base').value}`,
                billAmount: document.getElementById('c-bill').value,
                status: 'done',
                bookingDate: new Date().toISOString().split('T')[0]
            }).then(() => location.reload());
        }

        db.collection("clients").orderBy("bookingDate", "desc").onSnapshot(snap => {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            snap.forEach(doc => {
                let d = doc.data();
                body.innerHTML += `<tr>
                    <td>${d.bookingDate}</td>
                    <td>${d.clientName}</td>
                    <td>${d.serviceName}<br><small style="color:#777">${d.history}</small></td>
                    <td>₹${d.billAmount}</td>
                    <td onclick="markDone('${doc.id}')" style="cursor:pointer">${d.status=='done'?'✔️':'Pending'}</td>
                </tr>`;
            });
        });

        function markDone(id) { db.collection("clients").doc(id).update({status:'done'}); }
    </script>
</body>
</html>
