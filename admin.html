<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Admin Final</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 6px solid #d35400; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .formula-box { background: #fff3e0; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px dashed #d35400; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .save-btn { background: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Hairolozy Bookings</h2>
    <div id="list">Checking database...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Bina Index ke data nikalne ka seedha tarika
        db.collection("clients").onSnapshot((snapshot) => {
            const listDiv = document.getElementById("list");
            if (snapshot.empty) { listDiv.innerHTML = "No clients found."; return; }
            
            listDiv.innerHTML = ""; // Purani list clear karein

            snapshot.forEach((clientDoc) => {
                // Screenshot 1000364261 ke mutabiq har client ke andar 'Bookings' sub-collection hai
                db.collection("clients").doc(clientDoc.id).collection("Bookings").onSnapshot((bookingSnap) => {
                    bookingSnap.forEach((doc) => {
                        const data = doc.data();
                        const id = doc.id;
                        const path = doc.ref.path;
                        const history = data.history || "No record.";

                        // Agar card pehle se list mein hai toh use update karein, naya na banayein
                        let card = document.getElementById('card-' + id);
                        if (!card) {
                            card = document.createElement('div');
                            card.className = 'card';
                            card.id = 'card-' + id;
                            listDiv.appendChild(card);
                        }

                        card.innerHTML = `
                            <b>👤 ${data.clientName || 'No Name'}</b><br>
                            📞 ${data.clientPhone || 'No Phone'}<br>
                            ✂️ ${data.serviceName || 'No Service'}<br>
                            📅 ${data.bookingDate || ''} | 🕒 ${data.bookingTime || ''}
                            <div class="formula-box">
                                <strong>History:</strong> <span style="color:#d35400;">${history}</span>
                                <select id="brand-${id}">
                                    <option value="Loreal">Loreal</option>
                                    <option value="Redken">Redken</option>
                                    <option value="Schwarzkopf">Schwarzkopf</option>
                                </select>
                                <input type="text" id="input-${id}" placeholder="Formula likhein...">
                                <button class="save-btn" onclick="saveFormula('${path}', '${id}')">Save</button>
                            </div>
                            <button class="del-btn" onclick="deleteEntry('${path}')">Delete</button>
                        `;
                    });
                });
            });
        });

        function saveFormula(fullPath, id) {
            const b = document.getElementById('brand-'+id).value;
            const f = document.getElementById('input-'+id).value;
            if(!f) return alert("Write something!");
            db.doc(fullPath).update({ history: b + " - " + f }).then(() => alert("Saved!"));
        }

        function deleteEntry(fullPath) {
            if(confirm("Delete?")) db.doc(fullPath).delete();
        }
    </script>
</body>
</html>
