<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Admin | Master Suite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; border-top: 4px solid #D4AF37; }
        label { display: block; margin-bottom: 8px; color: #D4AF37; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        input, textarea { width: 100%; background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; box-sizing: border-box; outline: none; margin-bottom: 15px; }

        /* PILLS & BRAND BOX */
        .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .pill { background: #2a2a2a; border: 1px solid #444; padding: 8px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; color: #ccc; }
        .pill.active { background: rgba(212, 175, 55, 0.2); border-color: #D4AF37; color: #D4AF37; font-weight: bold; }

        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-save { background: linear-gradient(135deg, #D4AF37, #b5952f); color: #121212; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        /* CARD STYLE DASHBOARD */
        .client-card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; border-left: 4px solid #333; }
        .client-card.done { border-left-color: #25d366; }
        .client-card.pending { border-left-color: #ff9800; }
        
        .card-main { display: flex; justify-content: space-between; }
        .card-name { color: #D4AF37; font-size: 18px; font-weight: bold; margin: 0; }
        .card-services { color: #fff; font-size: 13px; margin: 5px 0; }
        
        /* EXPANDABLE SECTION */
        .card-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #444; animation: fadeIn 0.3s; }
        .matrix-box { background: #252525; padding: 10px; border-radius: 6px; font-size: 12px; color: #bbb; white-space: pre-line; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header"><h1>Hairolozy Admin</h1></div>

    <!-- ADD RECORD SECTION -->
    <div class="panel">
        <label>Client & Phone</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="c-name" placeholder="Name">
            <input type="tel" id="c-phone" placeholder="Phone">
        </div>

        <label>Brands (Select One or More)</label>
        <div class="pill-grid" id="brand-grid">
            <div class="pill" onclick="togglePill(this, 'brands')">L'Oréal</div>
            <div class="pill" onclick="togglePill(this, 'brands')">Redken</div>
            <div class="pill" onclick="togglePill(this, 'brands')">Schwarzkopf</div>
            <div class="pill" onclick="togglePill(this, 'brands')">Wella</div>
        </div>

        <label>Services (Multiple)</label>
        <div class="pill-grid" id="service-grid">
            <div class="pill" onclick="togglePill(this, 'services')">Haircut</div>
            <div class="pill" onclick="togglePill(this, 'services')">Global Color</div>
            <div class="pill" onclick="togglePill(this, 'services')">Balayage</div>
            <div class="pill" onclick="togglePill(this, 'services')">Nanoplastia</div>
            <div class="pill" onclick="togglePill(this, 'services')">Keratin</div>
            <div class="pill" onclick="togglePill(this, 'services')">Root Touch-up</div>
        </div>

        <label>Color Matrix & Mix</label>
        <div class="matrix-grid">
            <input type="text" id="m-base" placeholder="Base Formula">
            <input type="text" id="m-target" placeholder="Target/Mix">
            <input type="text" id="m-dev" placeholder="Developer (%)">
            <input type="text" id="m-time" placeholder="Time (Min)">
        </div>

        <input type="number" id="c-bill" placeholder="Bill Amount (₹)">
        <button class="btn-save" onclick="saveRecord()">Save Final Record</button>
    </div>

    <h2 style="font-size: 18px; margin-left: 5px;">📋 Client Logs</h2>
    <div id="cards-container"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A", authDomain: "hairolozy-12bec.firebaseapp.com", projectId: "hairolozy-12bec", storageBucket: "hairolozy-12bec.appspot.com", messagingSenderId: "386170490787", appId: "1:386170490787:web:58b592d8a44d0e3de65416" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedBrands = [];
        let selectedServices = [];

        function togglePill(el, type) {
            const val = el.innerText;
            const arr = type === 'brands' ? selectedBrands : selectedServices;
            const idx = arr.indexOf(val);
            
            if(idx > -1) { arr.splice(idx, 1); el.classList.remove('active'); }
            else { arr.push(val); el.classList.add('active'); }
        }

        function saveRecord() {
            const name = document.getElementById('c-name').value;
            const history = `Brand: ${selectedBrands.join(', ')}\nBase: ${document.getElementById('m-base').value}\nTarget: ${document.getElementById('m-target').value}\nDev: ${document.getElementById('m-dev').value} | Time: ${document.getElementById('m-time').value}`;
            
            if(!name || selectedServices.length === 0) return alert("Name & Services are must!");

            db.collection("clients").add({
                clientName: name, 
                clientPhone: document.getElementById('c-phone').value,
                serviceName: selectedServices.join(', '),
                history: history,
                billAmount: document.getElementById('c-bill').value,
                status: 'done',
                bookingDate: new Date().toISOString().split('T')[0]
            }).then(() => location.reload());
        }

        function loadRecords() {
            db.collection("clients").orderBy("bookingDate", "desc").onSnapshot(snap => {
                const container = document.getElementById('cards-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = `client-card ${d.status}`;
                    card.innerHTML = `
                        <div class="card-main" onclick="toggleDetails('${doc.id}')">
                            <div>
                                <p class="card-name">${d.clientName}</p>
                                <p class="card-services">${d.serviceName}</p>
                            </div>
                            <div style="text-align:right">
                                <span style="font-size:14px; font-weight:bold; color:#25d366;">₹${d.billAmount || 0}</span><br>
                                <span style="font-size:10px; color:#aaa;">${d.bookingDate}</span>
                            </div>
                        </div>
                        <div class="card-details" id="det-${doc.id}">
                            <div class="matrix-box">${d.history || 'No Matrix Recorded'}</div>
                            <p style="font-size:11px; color:#D4AF37; margin-top:10px;">Phone: ${d.clientPhone || 'N/A'}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function toggleDetails(id) {
            const el = document.getElementById('det-' + id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = loadRecords;
    </script>
</body>
                </html>
