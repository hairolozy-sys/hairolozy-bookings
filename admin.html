<!-- Formula Box ke andar ye wala hissa add karein: -->
<div class="formula-box">
    <strong>Select Brand:</strong>
    <select id="brand-${id}" class="formula-input">
        <option value="Loreal">Loreal</option>
        <option value="Redken">Redken</option>
        <option value="Keune">Keune</option>
        <option value="Schwarzkopf">Schwarzkopf</option>
        <option value="Alfaparf">Alfaparf</option>
        <option value="Other">Other</option>
    </select>
    
    <input type="text" id="input-${id}" class="formula-input" placeholder="Formula/Shade likhein...">
    <button class="save-btn" onclick="saveFormula('${id}')">Save Formula</button>
</div>
