<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Premium Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ========================================== */
        /* ORIGINAL DARK LUXURY THEME (UNTOUCHED)     */
        /* ========================================== */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 15px; margin: 0; }
        .header { background: #1a1a1a; color: #D4AF37; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-bottom: 2px solid #D4AF37; }
        h2 { margin: 0; font-size: 24px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .dashboard { display: flex; gap: 15px; margin-top: 15px; }
        .dash-box { background: #1e1e1e; color: #fff; flex: 1; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dash-box h3 { margin: 0; font-size: 13px; font-weight: normal; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .dash-box p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #D4AF37; }
        .dash-box.green p { color: #2ecc71; }
        .search-container { margin: 20px 0; position: sticky; top: 75px; z-index: 99; }
        .search-bar { width: 100%; padding: 15px 20px; border-radius: 30px; background: #1e1e1e; border: 1px solid #444; color: #fff; font-size: 15px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .search-bar:focus { border-color: #D4AF37; box-shadow: 0 0 8px rgba(212, 175, 55, 0.3); }
        .search-bar::placeholder { color: #777; }
        .card { background: #1e1e1e; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid #D4AF37; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; transition: 0.3s; border-right: 1px solid #333; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .card.done { border-left: 5px solid #27ae60; opacity: 0.8; }
        .card.vip { border-left: 5px solid #D4AF37 !important; box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
        .card-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .client-info { display: flex; flex-direction: column; gap: 5px; }
        .client-name { font-size: 18px; font-weight: bold; color: #fff; }
        .client-details { font-size: 13px; color: #aaa; }
        .time-badge { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid #D4AF37; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .done .time-badge { background: rgba(39, 174, 96, 0.1); color: #2ecc71; border-color: #2ecc71; text-decoration: line-through; }
        .bill-badge { font-size: 14px; color: #2ecc71; font-weight: bold; margin-top: 5px; }
        .card-body { padding: 0 15px 15px 15px; display: none; border-top: 1px solid #333; margin-top: 5px; padding-top: 15px; }
        .formula-box { background: #252525; padding: 15px; border-radius: 8px; border: 1px dashed #555; margin-bottom: 15px; font-size: 14px; color: #ddd; line-height: 1.6; }
        .formula-box strong { color: #D4AF37; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .matrix-grid input, .matrix-grid select { background: #2a2a2a; color: #fff; width: 100%; padding: 12px; margin: 0; border-radius: 6px; border: 1px solid #444; font-size: 13px; box-sizing: border-box; outline: none; }
        .matrix-grid input:focus, .matrix-grid select:focus { border-color: #D4AF37; }
        .full-width { grid-column: span 2; }
        .bill-input { grid-column: span 2; border: 1px solid #2ecc71 !important; color: #2ecc71 !important; font-weight: bold; font-size: 16px !important; }
        .brand-select { border: 1px solid #D4AF37 !important; color: #D4AF37 !important; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .save-btn { background: #d35400; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .done-btn { background: #27ae60; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .del-btn { background: transparent; color: #e74c3c; width: 100%; padding: 10px; border: 1px solid #e74c3c; border-radius: 8px; margin-top: 12px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .upload-btn { background: #2980b9; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: #D4AF37; color: #121212; width: 65px; height: 65px; border-radius: 50%; text-align: center; line-height: 60px; font-size: 35px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); cursor: pointer; z-index: 101; border: none; font-weight: bold; transition: 0.3s; }
        .fab:hover { transform: scale(1.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 102; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; animation: slideUp 0.3s ease; border: 1px solid #333; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { float: right; cursor: pointer; font-size: 26px; font-weight: bold; color: #888; margin-top: -15px; }
        .modal-content input { background: #2a2a2a; color: #fff; width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; font-size: 14px; outline: none; }
        .modal-content input:focus { border-color: #D4AF37; }
        .add-btn { background: #D4AF37; color: #121212; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 15px; }

        /* ========================================== */
        /* CLEAN LIGHT-THEME AI INTERFACE             */
        /* ========================================== */
        .ai-fab { position: fixed; bottom: 30px; right: 110px; background: #2c3e50; color: #D4AF37; width: 65px; height: 65px; border-radius: 50%; text-align: center; line-height: 60px; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0, 0.5); cursor: pointer; z-index: 101; border: 2px solid #D4AF37; font-weight: bold; transition: 0.3s; }
        
        .ai-fullscreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FAF9F6; z-index: 2000; overflow-y: auto; color: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .ai-topbar { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .ai-logo { font-weight: 800; font-size: 24px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 5px; }
        
        .ai-avatar-container { display: flex; justify-content: center; margin-top: 20px; }
        .ai-avatar { width: 70px; height: 70px; background: #111; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #D4AF37; font-size: 32px; font-family: serif; font-style: italic; border: 2px solid #EBE5D9; }
        
        .ai-greeting { font-family: 'Times New Roman', Times, serif; font-size: 28px; font-style: italic; text-align: center; margin: 20px 30px; line-height: 1.2; color: #111; }
        
        .ai-pills { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .ai-pill { background: transparent; border: 1px solid #ddd; padding: 10px 18px; border-radius: 25px; font-size: 14px; font-weight: 600; color: #333; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .ai-card { background: #fff; border: 1px solid #EAE3D9; border-radius: 16px; padding: 20px; margin: 0 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); cursor: pointer; }
        .ai-card-tag { font-size: 10px; font-weight: 800; color: #C2A284; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .ai-card-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .ai-card-desc { font-size: 13px; color: #666; }

        .ai-form-area { display: none; margin: 20px; background: #fff; border: 1px solid #ddd; border-radius: 16px; padding: 20px; }
        .ai-form-area input, .ai-form-area select { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 10px; background: #f9f9f9; box-sizing: border-box; font-size: 14px; outline: none; }
        .ai-form-area input:focus, .ai-form-area select:focus { border-color: #C2A284; }
        .ai-submit-btn { width: 100%; background: #111; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 15px; margin-top: 5px; cursor: pointer; }
        
        .result-box { background: #f4f4f4; padding: 15px; border-radius: 10px; border-left: 4px solid #C2A284; margin-top: 15px; display: none; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allBookings = {};

        function openModal() { document.getElementById('walkinModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('walkinModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('walkinModal')) closeModal(); }

        function toggleCard(id) {
            let body = document.getElementById('body-' + id);
            body.style.display = (body.style.display === 'block') ? 'none' : 'block';
        }

        function filterList() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                cards[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        function updateDashboard() {
            let rev = 0; let clientsCount = 0;
            const now = new Date();
            const format1 = now.toLocaleDateString(); 
            const format2 = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; 

            for (let id in allBookings) {
                let b = allBookings[id];
                if (b.date === format1 || b.date === format2) {
                    clientsCount++;
                    if (b.status === 'done' && b.bill) rev += parseFloat(b.bill);
                }
            }
            document.getElementById('dash-clients').innerText = clientsCount;
            document.getElementById('dash-revenue').innerText = "₹" + rev;
        }

        function startSync() {
            const folders = ["Bookings", "bookings", "clientname", "clients"];
            folders.forEach(folder => {
                const ref = (folder === "clients") ? db.collection(folder) : db.collectionGroup(folder);
                ref.onSnapshot((snap) => {
                    snap.forEach(doc => {
                        const data = doc.data();
                        if (!data.clientName && !data.name) return;
                        allBookings[doc.id] = { date: data.bookingDate || data.date || '', status: data.status || 'pending', bill: data.billAmount || 0 };
                        renderCard(doc);
                    });
                    updateDashboard();
                });
            });
        }

        function renderCard(doc) {
            const data = doc.data();
            if (!data.clientName && !data.name) return;
            const id = doc.id;
            const path = doc.ref.path;
            
            let existingCard = document.getElementById('card-' + id);
            if (existingCard) { existingCard.remove(); }

            const listDiv = document.getElementById("list");
            if (listDiv.innerHTML.includes("Loading")) listDiv.innerHTML = "";

            let statusClass = data.status === 'done' ? 'done' : '';
            if (data.isVIP) statusClass += ' vip';

            const statusText = data.status === 'done' ? 'Completed' : (data.bookingTime || data.time || 'Walk-in');
            const billDisplay = data.billAmount ? `<div class="bill-badge">💰 Bill: ₹${data.billAmount}</div>` : '';
            const photoDisplay = data.photoUrl ? `<img src="${data.photoUrl}" style="max-width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444;">` : '';

            const vipBadge = data.isVIP ? ` <span style="color:#D4AF37; font-size:12px;">[VIP]</span>` : '';

            const card = document.createElement('div');
            card.className = `card ${statusClass}`;
            card.id = 'card-' + id;
            
            card.innerHTML = `
                <div class="card-header" onclick="toggleCard('${id}')">
                    <div class="client-info">
                        <span class="client-name">👤 ${data.clientName || data.name}${vipBadge}</span>
                        <span class="client-details">✂️ ${data.serviceName || 'N/A'} | 📞 ${data.clientPhone || 'N/A'}</span>
                        ${billDisplay}
                    </div>
                    <div class="time-badge">🕒 ${statusText}</div>
                </div>
                
                <div class="card-body" id="body-${id}">
                    ${photoDisplay}
                    <div class="formula-box">
                        <strong>Last Formulation:</strong><br> ${data.history || "No record."}
                    </div>
                    
                    <div class="matrix-grid">
                        <select id="brand-${id}" class="full-width brand-select">
                            <option value="" style="color:#aaa;">🎨 Select Color Brand</option>
                            <option value="L'Oréal">L'Oréal</option>
                            <option value="Redken">Redken</option>
                            <option value="Schwarzkopf">Schwarzkopf</option>
                            <option value="Keune">Keune</option>
                            <option value="Alfaparf">Alfaparf</option>
                            <option value="Wella">Wella</option>
                            <option value="Matrix">Matrix</option>
                            <option value="Other">Other (Note below)</option>
                        </select>
                        <input type="text" id="base-${id}" placeholder="Base Color / Roots">
                        <input type="text" id="target-${id}" placeholder="Target Tone">
                        <select id="vol-${id}">
                            <option value="" style="color:#aaa;">Developer Volume</option>
                            <option value="10V">10 Vol (3%)</option>
                            <option value="20V">20 Vol (6%)</option>
                            <option value="30V">30 Vol (9%)</option>
                            <option value="40V">40 Vol (12%)</option>
                        </select>
                        <input type="text" id="time-${id}" placeholder="Processing Time">
                        <input type="text" id="ph-${id}" class="full-width" placeholder="Bond Builder / Notes">
                        <input type="number" id="bill-${id}" class="bill-input" placeholder="Total Bill (₹)" value="${data.billAmount || ''}">
                    </div>

                    <div style="background: #252525; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px dashed #444;">
                        <input type="file" id="img-${id}" accept="image/*" style="font-size: 13px; width: 100%; border: none; padding: 0;">
                        <button class="upload-btn" onclick="uploadPhoto('${path}', '${id}')">📸 Upload Result Photo</button>
                    </div>

                    <div class="btn-group">
                        <button class="save-btn" onclick="updateFormula('${path}', '${id}')">💾 Save Matrix</button>
                        <button class="done-btn" onclick="markDone('${path}', '${id}')">✔️ Mark Done</button>
                    </div>
                    <button class="del-btn" onclick="deleteEntry('${path}')">🗑️ Delete Record</button>
                    
                    <button onclick="db.doc('${path}').update({isVIP: ${!data.isVIP}})" style="background:transparent; color:#D4AF37; width:100%; padding:10px; border:1px solid #D4AF37; border-radius:8px; margin-top:12px; font-size:13px; cursor:pointer;">${data.isVIP ? 'Remove VIP' : 'Mark as VIP'}</button>
                </div>
            `;
            listDiv.insertBefore(card, listDiv.firstChild);
        }

        function addDirectClient() {
            const name = document.getElementById('new-name').value;
            const phone = document.getElementById('new-phone').value;
            const service = document.getElementById('new-service').value;
            const formula = document.getElementById('new-formula').value;
            if(!name) return alert("Name zaroori hai!");
            
            if(new Date().getDay() === 4) {
                if(!confirm("Aaj Thursday (Weekly Off) hai! Phir bhi entry karni hai?")) return;
            }

            const todayFormatted = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
            db.collection("clients").add({ clientName: name, clientPhone: phone, serviceName: service, history: formula, bookingDate: todayFormatted, bookingTime: "Walk-in", status: 'pending' }).then(() => { closeModal(); document.getElementById('new-name').value = ""; document.getElementById('new-formula').value = ""; });
        }

        function getMatrixData(id) {
            const brand = document.getElementById('brand-' + id).value; const base = document.getElementById('base-' + id).value; const target = document.getElementById('target-' + id).value; const vol = document.getElementById('vol-' + id).value; const time = document.getElementById('time-' + id).value; const ph = document.getElementById('ph-' + id).value;
            return `<b>Brand:</b> <span style="color:#D4AF37">${brand || '-'}</span> <br><b>Base:</b> ${base || '-'} | <b>Target:</b> ${target || '-'} <br><b>Dev:</b> ${vol || '-'} | <b>Time:</b> ${time || '-'} <br><b>Treatments:</b> ${ph || '-'}`;
        }

        function updateFormula(fullPath, id) { db.doc(fullPath).update({ history: getMatrixData(id) }).then(() => alert("Formulation Matrix Saved!")); }
        function markDone(fullPath, id) {
            const bill = document.getElementById('bill-' + id).value;
            if(!bill && !confirm("Aa
