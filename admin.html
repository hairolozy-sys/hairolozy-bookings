<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Admin Ultimate</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 6px solid #d35400; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .formula-box { background: #fff3e0; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px dashed #d35400; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .save-btn { background: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 10px; font-size: 12px; }
        .debug-info { font-size: 10px; color: #999; margin-top: 5px; word-break: break-all; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Hairolozy Admin Pro</h2>
    <div id="list">Searching everywhere...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Ye function har tarah ke path se data nikal lega
        function loadData(colName) {
            db.collectionGroup(colName).onSnapshot((querySnapshot) => {
                const listDiv = document.getElementById("list");
                if (querySnapshot.empty && listDiv.innerHTML.includes("Searching")) {
                    listDiv.innerHTML = "No bookings found in " + colName;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    // Agar ye card pehle se list mein hai toh use dobara add na karein
                    if (document.getElementById('card-' + doc.id)) return;

                    const data = doc.data();
                    const id = doc.id;
                    const path = doc.ref.path;
                    
                    // Saare possible fields check karein
                    const name = data.clientName || data.name || "No Name";
                    const phone = data.clientPhone || data.phone || "No Phone";
                    const service = data.serviceName || data.service || "No Service";
                    const history = data.history || "No record.";

                    const cardHtml = `
                        <div class="card" id="card-${id}">
                            <b>👤 ${name}</b><br>
                            📞 ${phone}<br>
                            ✂️ ${service}<br>
                            <div class="formula-box">
                                <strong>History:</strong> <span style="color:#d35400;">${history}</span>
                                <select id="brand-${id}">
                                    <option value="Loreal">Loreal</option>
                                    <option value="Redken">Redken</option>
                                    <option value="Keune">Keune</option>
                                    <option value="Schwarzkopf">Schwarzkopf</option>
                                </select>
                                <input type="text" id="input-${id}" placeholder="Formula...">
                                <button class="save-btn" onclick="saveFormula('${path}', '${id}')">Save</button>
                            </div>
                            <div class="debug-info">Path: ${path}</div>
                            <button class="del-btn" onclick="deleteEntry('${path}')">Delete</button>
                        </div>`;
                    
                    if (listDiv.innerHTML.includes("Searching") || listDiv.innerHTML.includes("No bookings")) {
                        listDiv.innerHTML = cardHtml;
                    } else {
                        listDiv.innerHTML += cardHtml;
                    }
                });
            });
        }

        // Dono tarah ke folders search karein
        loadData("bookings");
        loadData("Bookings");

        function saveFormula(fullPath, id) {
            const brand = document.getElementById('brand-' + id).value;
            const formula = document.getElementById('input-' + id).value;
            if(!formula) return alert("Kuch likhiye!");
            db.doc(fullPath).update({ history: brand + " - " + formula }).then(() => alert("Saved!"));
        }

        function deleteEntry(fullPath) {
            if(confirm("Delete?")) { db.doc(fullPath).delete().then(() => location.reload()); }
        }
    </script>
</body>
</html>
