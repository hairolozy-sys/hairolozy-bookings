<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Premium Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* LUXURY DARK THEME (ORIGINAL) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 15px; margin: 0; }
        .header { background: #1a1a1a; color: #D4AF37; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #D4AF37; }
        .dashboard { display: flex; gap: 15px; margin-top: 15px; }
        .dash-box { background: #1e1e1e; color: #fff; flex: 1; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .dash-box p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #D4AF37; }
        .search-container { margin: 20px 0; position: sticky; top: 75px; z-index: 99; }
        .search-bar { width: 100%; padding: 15px 20px; border-radius: 30px; background: #1e1e1e; border: 1px solid #444; color: #fff; font-size: 15px; outline: none; box-sizing: border-box; }
        .card { background: #1e1e1e; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid #D4AF37; padding: 15px; border-right: 1px solid #333; }
        .card-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .client-name { font-size: 18px; font-weight: bold; color: #fff; }
        .time-badge { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid #D4AF37; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .card-body { display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .matrix-grid input, .matrix-grid select { background: #2a2a2a; color: #fff; width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; font-size: 13px; box-sizing: border-box; }
        
        /* FLOATING BUTTONS */
        .fab { position: fixed; bottom: 30px; right: 30px; background: #D4AF37; color: #121212; width: 65px; height: 65px; border-radius: 50%; font-size: 35px; border: none; font-weight: bold; z-index: 101; cursor: pointer; }
        .ai-fab { position: fixed; bottom: 30px; right: 110px; background: #2c3e50; color: #D4AF37; width: 65px; height: 65px; border-radius: 50%; font-size: 24px; border: 2px solid #D4AF37; font-weight: bold; z-index: 101; cursor: pointer; }

        /* AI FULLSCREEN (LIGHT THEME) */
        .ai-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FAF9F6; z-index: 2000; overflow-y: auto; color: #111; padding-bottom: 50px; }
        .ai-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ai-avatar { width: 70px; height: 70px; background: #111; border-radius: 50%; margin: 20px auto; display: flex; justify-content: center; align-items: center; color: #D4AF37; font-size: 30px; font-style: italic; }
        .ai-greeting { text-align: center; font-family: serif; font-size: 26px; font-style: italic; padding: 0 20px; margin-bottom: 30px; }
        .ai-pills { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .pill { background: #fff; border: 1px solid #ddd; padding: 10px 15px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .ai-card { background: #fff; border: 1px solid #EAE3D9; border-radius: 16px; padding: 20px; margin: 0 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .ai-form { display: none; padding: 20px; }
        .ai-form input, .ai-form select, .ai-form textarea { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; background: #f9f9f9; box-sizing: border-box; }
        .ai-btn { width: 100%; background: #111; color: #fff; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 102; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header"><h2>Hairolozy Admin</h2></div>
    <div style="padding: 15px;">
        <div class="dashboard">
            <div class="dash-box"><h3>Today's Clients</h3><p id="dash-clients">0</p></div>
            <div class="dash-box"><h3>Revenue</h3><p id="dash-revenue">₹0</p></div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search Client..." onkeyup="filterList()">
        </div>
        <div id="list">Loading Luxury Experience...</div>
    </div>

    <button class="fab" onclick="document.getElementById('walkinModal').style.display='flex'">+</button>
    <button class="ai-fab" onclick="openAIScreen()">AI</button>

    <div id="walkinModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#D4AF37; text-align:center;">New Walk-in</h3>
            <input type="text" id="new-name" placeholder="Client Name" style="width:100%; padding:12px; margin-bottom:10px; background:#2a2a2a; color:#fff; border:1px solid #444; border-radius:8px;">
            <input type="tel" id="new-phone" placeholder="Phone Number" style="width:100%; padding:12px; margin-bottom:10px; background:#2a2a2a; color:#fff; border:1px solid #444; border-radius:8px;">
            <button class="add-btn" onclick="addClient()" style="width:100%; background:#D4AF37; padding:15px; border:none; border-radius:8px; font-weight:bold;">Save Client</button>
            <button onclick="document.getElementById('walkinModal').style.display='none'" style="width:100%; background:transparent; color:#888; border:none; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="aiScreen" class="ai-screen">
        <div class="ai-top">
            <div style="font-size:24px;">☰</div>
            <div style="font-weight:bold; letter-spacing:1px;">HAIROLOZY</div>
            <div style="font-size:30px; cursor:pointer;" onclick="closeAIScreen()">&times;</div>
        </div>
        <div class="ai-avatar">ℋ</div>
        <div class="ai-greeting">Your client trusts you, Arman. I'll give you the data.</div>
        
        <div class="ai-pills">
            <button class="pill" onclick="showAIForm()">🎨 Create formula</button>
            <label for="cameraInput" class="pill">⛶ Analyze color</label>
            <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none;" onchange="analyzeHair()">
        </div>

        <div class="ai-card" id="aiConsultCard" onclick="showAIForm()">
            <div style="font-size:10px; color:#C2A284; font-weight:bold; letter-spacing:1px;">SALON ADVISOR</div>
            <div style="font-size:18px; font-weight:bold; margin:5px 0;">Start consultation &rarr;</div>
            <div style="font-size:13px; color:#666;">Advanced formulation with exact mixing ratios.</div>
        </div>

        <div id="aiFormArea" class="ai-form">
            <input type="text" id="aiName" placeholder="Client Name">
            <input type="number" id="aiBase" placeholder="Current Level (1-10)">
            <input type="text" id="aiTarget" placeholder="Target Shade (e.g. 8.1)">
            <select id="aiBrand">
                <option value="">Select Color Brand</option>
                <option value="L'Oréal Majirel / INOA">L'Oréal (Majirel / INOA / Dia)</option>
                <option value="Redken Shades EQ">Redken (Shades EQ / Color Gels)</option>
                <option value="Schwarzkopf Igora">Schwarzkopf (Igora / Vibrance)</option>
                <option value="Wella Koleston">Wella (Koleston / Illumina)</option>
            </select>
            <button class="ai-btn" onclick="calculateFormula()">✨ Calculate & Download PDF</button>
            <div id="aiResult" style="margin-top:20px; padding:15px; background:#fff; border-radius:10px; border-left:4px solid #D4AF37; display:none; font-size:14px;"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE LOGIC (Original Restoration) ---
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allBookings = {};

        function startSync() {
            db.collectionGroup("clients").onSnapshot((snap) => {
                snap.forEach(doc => {
                    const data = doc.data();
                    allBookings[doc.id] = data;
                    renderCard(doc);
                });
                updateDashboard();
            });
            // Adding backup for "clients" root folder
            db.collection("clients").onSnapshot((snap) => {
                snap.forEach(doc => {
                    const data = doc.data();
                    allBookings[doc.id] = data;
                    renderCard(doc);
                });
                updateDashboard();
            });
        }

        function renderCard(doc) {
            const data = doc.data();
            const id = doc.id;
            const listDiv = document.getElementById("list");
            if (listDiv.innerHTML.includes("Loading")) listDiv.innerHTML = "";

            let existing = document.getElementById('card-' + id);
            if (existing) existing.remove();

            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'card-' + id;
            card.innerHTML = `
                <div class="card-header" onclick="toggleCard('${id}')">
                    <div class="client-info">
                        <span class="client-name">👤 ${data.clientName || data.name || 'Unknown'}</span><br>
                        <span style="font-size:12px; color:#aaa;">📞 ${data.clientPhone || 'N/A'}</span>
                    </div>
                    <div class="time-badge">${data.status || 'Walk-in'}</div>
                </div>
                <div class="card-body" id="body-${id}">
                    <div class="formula-box"><strong>History:</strong> ${data.history || 'No records found.'}</div>
                </div>
            `;
            listDiv.insertBefore(card, listDiv.firstChild);
        }

        function toggleCard(id) {
            let b = document.getElementById('body-' + id);
            b.style.display = (b.style.display === 'block') ? 'none' : 'block';
        }

        function updateDashboard() {
            document.getElementById('dash-clients').innerText = Object.keys(allBookings).length;
        }

        function addClient() {
            const n = document.getElementById('new-name').value;
            const p = document.getElementById('new-phone').value;
            if(!n) return alert("Name required!");
            db.collection("clients").add({ clientName: n, clientPhone: p, date: new Date().toLocaleDateString(), status: 'pending' })
            .then(() => { document.getElementById('walkinModal').style.display='none'; });
        }

        // --- AI & PDF LOGIC ---
        function openAIScreen() { document.getElementById('aiScreen').style.display='block'; }
        function closeAIScreen() { document.getElementById('aiScreen').style.display='none'; }
        function showAIForm() { 
            document.getElementById('aiConsultCard').style.display='none';
            document.getElementById('aiFormArea').style.display='block';
        }

        function analyzeHair() {
            alert("Analyzing hair structure via camera...");
            setTimeout(() => {
                showAIForm();
                document.getElementById('aiBase').value = 5;
                alert("AI Detected: Base Level 5 (Orange-Red Pigment)");
            }, 1500);
        }

        function calculateFormula() {
            const name = document.getElementById('aiName').value;
            const base = parseInt(document.getElementById('aiBase').value);
            const targetStr = document.getElementById('aiTarget').value;
            const brand = document.getElementById('aiBrand').value;

            if(!name || !base || !targetStr || !brand) return alert("Fill all details!");

            let target = parseFloat(targetStr);
            let lift = target - base;
            let dev = lift > 2 ? "30 Vol" : "20 Vol";
            let ratio = "1:1.5";
            let formula = `40g Shade ${targetStr} + 60g ${dev}`;

            const res = document.getElementById('aiResult');
            res.style.display = 'block';
            res.innerHTML = `<strong>Result:</strong> ${formula} <br><strong>Pigment:</strong> Neutralize with Blue/Ash.`;

            // PDF Download
            const doc = new jspdf.jsPDF();
            doc.text("HAIROLOZY AI REPORT", 105, 20, null, null, "center");
            doc.text(`Client: ${name}`, 20, 40);
            doc.text(`Brand: ${brand}`, 20, 50);
            doc.text(`Formula: ${formula}`, 20, 60);
            doc.text(`Ratio: ${ratio}`, 20, 70);
            doc.save(`Formula_${name}.pdf`);
        }

        function filterList() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                cards[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        startSync();
    </script>
</body>
</html>
