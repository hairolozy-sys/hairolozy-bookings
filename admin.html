<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairolozy Admin Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 6px solid #d35400; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .formula-box { background: #fff3e0; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px dashed #d35400; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .save-btn { background: #d35400; color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 10px; font-size: 12px; }
        .other-brand { display: none; margin-top: 5px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Hairolozy Admin Pro</h2>
    <div id="list">Checking database...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABGjbHjlLdUIHrbUxhD_Jp2ZScrMegX5A",
            authDomain: "hairolozy-12bec.firebaseapp.com",
            projectId: "hairolozy-12bec",
            storageBucket: "hairolozy-12bec.appspot.com",
            messagingSenderId: "386170490787",
            appId: "1:386170490787:web:58b592d8a44d0e3de65416"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function startSync() {
            const listDiv = document.getElementById("list");
            const folders = ["Bookings", "bookings", "clientname", "clients"];
            
            folders.forEach(folder => {
                const ref = (folder === "clients") ? db.collection(folder) : db.collectionGroup(folder);
                ref.onSnapshot((snap) => {
                    snap.forEach(doc => renderCard(doc));
                });
            });
        }

        function renderCard(doc) {
            const data = doc.data();
            if (!data.clientName && !data.name) return;
            const id = doc.id;
            const path = doc.ref.path;
            if (document.getElementById('card-' + id)) return;

            const listDiv = document.getElementById("list");
            if (listDiv.innerHTML.includes("Checking")) listDiv.innerHTML = "";

            const history = data.history || "No record.";
            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'card-' + id;
            card.innerHTML = `
                <b>👤 ${data.clientName || data.name}</b><br>
                📞 ${data.clientPhone || data.phone || 'N/A'}<br>
                ✂️ ${data.serviceName || 'N/A'}<br>
                📅 ${data.bookingDate || ''} | 🕒 ${data.bookingTime || ''}
                <div class="formula-box">
                    <strong>Formula History:</strong><br>
                    <span style="color:#d35400;">${history}</span>
                    <select id="brand-${id}" onchange="toggleOther('${id}')">
                        <option value="Loreal">Loreal</option>
                        <option value="Redken">Redken</option>
                        <option value="Schwarzkopf">Schwarzkopf</option>
                        <option value="Keune">Keune</option>
                        <option value="Alfaparf">Alfaparf</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="other-input-${id}" class="other-brand" placeholder="Brand ka naam likhein...">
                    <input type="text" id="formula-${id}" placeholder="Formula details likhein...">
                    <button class="save-btn" onclick="saveFormula('${path}', '${id}')">Save Formula</button>
                </div>
                <button class="del-btn" onclick="deleteEntry('${path}')">Delete Booking</button>
            `;
            listDiv.appendChild(card);
        }

        function toggleOther(id) {
            const select = document.getElementById('brand-' + id);
            const otherInput = document.getElementById('other-input-' + id);
            otherInput.style.display = (select.value === "Other") ? "block" : "none";
        }

        function saveFormula(fullPath, id) {
            let brand = document.getElementById('brand-' + id).value;
            const formula = document.getElementById('formula-' + id).value;
            
            if (brand === "Other") {
                brand = document.getElementById('other-input-' + id).value || "Other";
            }
            
            if(!formula) return alert("Formula likhna zaroori hai!");
            
            db.doc(fullPath).update({ 
                history: brand + ": " + formula 
            }).then(() => {
                alert("Formula save ho gaya!");
            });
        }

        function deleteEntry(fullPath) {
            if(confirm("Delete karna chahte hain?")) db.doc(fullPath).delete().then(() => location.reload());
        }

        startSync();
    </script>
</body>
</html>
